# Голосовой ассистент → n8n
# HA Companion App → Assist → текст команды → Webhook в n8n

- id: voice_to_n8n
  alias: "Голосовая команда → n8n"
  description: "Передаёт голосовую команду из HA Assist в n8n как задачу"
  trigger:
    - platform: conversation
  action:
    - service: rest_command.n8n_voice_task
      data:
        prompt: "{{ trigger.slots.conversation_command | default(trigger.text) }}"
