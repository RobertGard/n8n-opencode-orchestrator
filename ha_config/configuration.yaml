# Home Assistant core config — минимум для голосового ассистента
# Полная конфигурация через UI после первого запуска

default_config:

http:
  use_x_forwarded_for: true
  use_x_forwarded_host: true
  trusted_proxies:
    - 127.0.0.1
    - ::1

conversation:
api:

mobile_app:

# Голосовой ассистент — локальный STT/TTS через Wyoming
assist_pipeline:

# Автоматизации в отдельном файле
automation: !include automations.yaml

# REST-команда для отправки голосовых задач в n8n
rest_command:
  n8n_voice_task:
    url: "http://127.0.0.1:5678/webhook/voice-task"
    method: POST
    headers:
      content-type: "application/json"
    payload: '{"prompt":"{{ prompt }}"}'
